name: Codacy Security Scan

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:
  schedule:
    - cron: '30 3 * * *'

permissions:
  contents: read
  security-events: write # Required to upload SARIF to GitHub Security tab
  actions: read

jobs:
  codacy-security-scan:
    name: Codacy Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Generate local config to run only your preferred security tools
      - name: Generate Codacy Configuration
        run: |
          cat > .codacy.yaml <<'EOF'
          ---
          engines:
            bandit:
              enabled: true
            semgrep:
              enabled: true
            checkov:
              enabled: true
            trivy:
              enabled: true
            eslint:
              enabled: false
            stylelint:
              enabled: false
          EOF

      # 2. Run Codacy Analysis (without the tool: flag so it reads .codacy.yaml)
      - name: Run Codacy Analysis CLI
        uses: codacy/codacy-analysis-cli-action@master
        continue-on-error: true
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          verbose: true
          output: results.sarif
          format: sarif
          gh-code-scanning-compat: true
          max-allowed-issues: 2147483647
          skip-uncommitted-files-check: true
          exclude-paths: >
            node_modules,
            frontend/node_modules,
            backend/node_modules,
            frontend/.next,
            backend/venv,
            backend/.venv,
            backend/chroma_db,
            backend/data,
            backend/logs,
            backend/data/orchestration_runs,
            backend/.playwright-mcp,
            dist,
            frontend-build,
            synapse/_frontend,
            **/__pycache__,
            **/*.egg-info,
            **/*.whl,
            **/*.tar.gz,
            package-lock.json,
            frontend/package-lock.json,
            backend/package-lock.json,
            tsconfig.tsbuildinfo,
            frontend/tsconfig.tsbuildinfo

      # 3. Memory-safe SARIF patch to merge ALL results into exactly ONE run
      - name: Patch SARIF Categories for GitHub
        run: |
          sudo python3 -c '
          import json, sys, os

          # Fallback if Codacy CLI failed to generate a valid file
          if not os.path.exists("results.sarif") or os.path.getsize("results.sarif") == 0:
              print("Warning: SARIF file missing or empty. Creating a valid placeholder.")
              data = {"$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json", "version": "2.1.0", "runs": []}
          else:
              try:
                  with open("results.sarif", "r") as f:
                      data = json.load(f)
              except json.JSONDecodeError:
                  print("Warning: SARIF file was corrupt. Creating a valid placeholder.")
                  data = {"$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json", "version": "2.1.0", "runs": []}

          # GitHub limit is 20. We will compress EVERYTHING into exactly 1 master run.
          if "runs" in data and len(data["runs"]) > 0:
              master_run = {
                  "tool": {
                      "driver": {
                          "name": "Codacy Security Scan",
                          "rules": []
                      }
                  },
                  "results": [],
                  "automationDetails": {"id": "codacy-combined-scan-master"}
              }
              
              seen_rule_ids = set()
              
              for run in data["runs"]:
                  # Extract and merge rules safely
                  driver = run.get("tool", {}).get("driver", {})
                  rules = driver.get("rules", [])
                  for rule in rules:
                      rule_id = rule.get("id")
                      if rule_id and rule_id not in seen_rule_ids:
                          master_run["tool"]["driver"]["rules"].append(rule)
                          seen_rule_ids.add(rule_id)
                          
                  # Extract and merge results
                  results = run.get("results", [])
                  master_run["results"].extend(results)
                  
              # Replace the 22 fragment runs with our 1 unified master run
              data["runs"] = [master_run]

          # Write safely to disk
          with open("results.sarif", "w") as f:
              json.dump(data, f, indent=2)
          
          # Safely print the final run count without breaking Bash quotes
          num_runs = len(data.get("runs", []))
          print("Successfully compressed into " + str(num_runs) + " master run for GitHub Advanced Security.")
          '

      # 4. Upload directly to the GitHub Security Tab
      - name: Upload SARIF results file
        uses: github/codeql-action/upload-sarif@main
        with:
          sarif_file: results.sarif