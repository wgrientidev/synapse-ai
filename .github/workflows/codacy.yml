name: Codacy Security Scan

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:
  schedule:
    - cron: '30 3 * * *'

permissions:
  contents: read
  security-events: write # Required to upload SARIF to GitHub Security tab
  actions: read

jobs:
  codacy-security-scan:
    name: Codacy Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Generate local config to run only your preferred security tools
      - name: Generate Codacy Configuration
        run: |
          cat > .codacy.yaml <<'EOF'
          ---
          engines:
            bandit:
              enabled: true
            semgrep:
              enabled: true
            checkov:
              enabled: true
            trivy:
              enabled: true
            eslint:
              enabled: false
            stylelint:
              enabled: false
          EOF

      # 2. Run Codacy Analysis (without the tool: flag so it reads .codacy.yaml)
      - name: Run Codacy Analysis CLI
        uses: codacy/codacy-analysis-cli-action@master
        continue-on-error: true
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          verbose: true
          output: results.sarif
          format: sarif
          gh-code-scanning-compat: true
          max-allowed-issues: 2147483647
          skip-uncommitted-files-check: true
          exclude-paths: >
            node_modules,
            frontend/node_modules,
            backend/node_modules,
            frontend/.next,
            backend/venv,
            backend/.venv,
            backend/chroma_db,
            backend/data,
            backend/logs,
            backend/data/orchestration_runs,
            backend/.playwright-mcp,
            dist,
            frontend-build,
            synapse/_frontend,
            **/__pycache__,
            **/*.egg-info,
            **/*.whl,
            **/*.tar.gz,
            package-lock.json,
            frontend/package-lock.json,
            backend/package-lock.json,
            tsconfig.tsbuildinfo,
            frontend/tsconfig.tsbuildinfo

      # 3. Memory-safe SARIF patch to merge runs and bypass GitHub's strict limits
      - name: Patch SARIF Categories for GitHub
        run: |
          sudo python3 -c '
          import json, sys, os

          # Fallback if Codacy CLI failed to generate a valid file
          if not os.path.exists("results.sarif") or os.path.getsize("results.sarif") == 0:
              print("Warning: SARIF file missing or empty. Creating a valid placeholder.")
              data = {"$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json", "version": "2.1.0", "runs": []}
          else:
              try:
                  with open("results.sarif", "r") as f:
                      data = json.load(f)
              except json.JSONDecodeError:
                  print("Warning: SARIF file was corrupt. Creating a valid placeholder.")
                  data = {"$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json", "version": "2.1.0", "runs": []}

          # GitHub limits SARIF files to 20 runs. We will group all runs by tool name.
          if "runs" in data:
              grouped_runs = {}
              for run in data["runs"]:
                  # Get the tool name (e.g., "Bandit", "Semgrep")
                  tool_name = run.get("tool", {}).get("driver", {}).get("name", "Codacy-Tool")
                  clean_name = tool_name.lower().replace(" ", "-")
                  
                  if tool_name not in grouped_runs:
                      # First time seeing this tool, initialize its grouped run
                      grouped_runs[tool_name] = {
                          "tool": run.get("tool", {"driver": {"name": tool_name, "rules": []}}),
                          "results": [],
                          "automationDetails": {"id": "codacy-" + clean_name}
                      }
                  else:
                      # We already have a run for this tool. Merge the rules to avoid duplicates.
                      existing_rules = grouped_runs[tool_name].get("tool", {}).get("driver", {}).get("rules", [])
                      existing_rule_ids = set()
                      for r in existing_rules:
                          if "id" in r:
                              existing_rule_ids.add(r["id"])
                      
                      new_rules = run.get("tool", {}).get("driver", {}).get("rules", [])
                      for rule in new_rules:
                          if rule.get("id") not in existing_rule_ids:
                              grouped_runs[tool_name]["tool"]["driver"]["rules"].append(rule)
                              if "id" in rule:
                                  existing_rule_ids.add(rule["id"])
                  
                  # Merge the actual vulnerabilities/results into the group
                  if "results" in run and run["results"]:
                      grouped_runs[tool_name]["results"].extend(run["results"])
                  
              # Replace the 33 fragment runs with our cleanly grouped runs (max 4)
              data["runs"] = list(grouped_runs.values())

          # Write safely to disk
          with open("results.sarif", "w") as f:
              json.dump(data, f, indent=2)
          
          # Safely print the final run count without breaking Bash quotes
          num_runs = len(data.get("runs", []))
          print("Successfully compressed into " + str(num_runs) + " runs for GitHub Advanced Security.")
          '

      # 4. Upload directly to the GitHub Security Tab
      - name: Upload SARIF results file
        uses: github/codeql-action/upload-sarif@main
        with:
          sarif_file: results.sarif