name: Codacy Security Scan

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:
  schedule:
    - cron: '30 3 * * *'

permissions:
  contents: read
  security-events: write # Required to upload SARIF to GitHub Security tab
  actions: read

jobs:
  codacy-security-scan:
    name: Codacy Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Generate local config to run only your preferred security tools
      - name: Generate Codacy Configuration
        run: |
          cat > .codacy.yaml <<'EOF'
          ---
          engines:
            bandit:
              enabled: true
            semgrep:
              enabled: true
            checkov:
              enabled: true
            trivy:
              enabled: true
            eslint:
              enabled: false
            stylelint:
              enabled: false
          EOF

      # 2. Run Codacy Analysis (without the tool: flag so it reads .codacy.yaml)
      - name: Run Codacy Analysis CLI
        uses: codacy/codacy-analysis-cli-action@master
        continue-on-error: true
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          verbose: true
          output: results.sarif
          format: sarif
          gh-code-scanning-compat: true
          max-allowed-issues: 2147483647
          skip-uncommitted-files-check: true
          exclude-paths: >
            node_modules,
            frontend/node_modules,
            backend/node_modules,
            frontend/.next,
            backend/venv,
            backend/.venv,
            backend/chroma_db,
            backend/data,
            backend/logs,
            backend/data/orchestration_runs,
            backend/.playwright-mcp,
            dist,
            frontend-build,
            synapse/_frontend,
            **/__pycache__,
            **/*.egg-info,
            **/*.whl,
            **/*.tar.gz,
            package-lock.json,
            frontend/package-lock.json,
            backend/package-lock.json,
            tsconfig.tsbuildinfo,
            frontend/tsconfig.tsbuildinfo

      # 3. Memory-safe SARIF patch to bypass GitHub's strict category rules
      - name: Patch SARIF Categories for GitHub
        run: |
          # Using sudo because the Codacy Docker action creates the file as 'root'
          sudo python3 -c '
          import json, sys, os

          # Fallback if Codacy CLI failed to generate a valid file
          if not os.path.exists("results.sarif") or os.path.getsize("results.sarif") == 0:
              print("Warning: SARIF file missing or empty. Creating a valid placeholder.")
              data = {"$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json", "version": "2.1.0", "runs": []}
          else:
              try:
                  with open("results.sarif", "r") as f:
                      data = json.load(f)
              except json.JSONDecodeError:
                  print("Warning: SARIF file was corrupt. Creating a valid placeholder.")
                  data = {"$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json", "version": "2.1.0", "runs": []}

          # Inject unique IDs so GitHub accepts multiple tools in one file
          if "runs" in data:
              for i, run in enumerate(data["runs"]):
                  # Safely get the tool name without f-string quote collisions
                  tool_name = run.get("tool", {}).get("driver", {}).get("name", "tool")
                  clean_name = tool_name.lower().replace(" ", "-")
                  
                  if "automationDetails" not in run:
                      run["automationDetails"] = {}
                  
                  # Apply the formatted ID
                  run["automationDetails"]["id"] = f"codacy-{clean_name}-{i}"

          # Write safely to disk
          with open("results.sarif", "w") as f:
              json.dump(data, f, indent=2)
          print("Successfully formatted SARIF for GitHub Advanced Security.")
          '

      # 4. Upload directly to the GitHub Security Tab
      - name: Upload SARIF results file
        uses: github/codeql-action/upload-sarif@main
        with:
          sarif_file: results.sarif