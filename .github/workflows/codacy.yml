name: Codacy Security Scan

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:
  schedule:
    - cron: '30 3 * * *'

permissions:
  contents: read
  security-events: write # Required to upload SARIF to GitHub Security tab
  actions: read

jobs:
  codacy-security-scan:
    name: Codacy Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Generate local config to run only your preferred security tools
      - name: Generate Codacy Configuration
        run: |
          cat > .codacy.yaml <<'EOF'
          ---
          engines:
            bandit:
              enabled: true
            semgrep:
              enabled: true
            checkov:
              enabled: true
            trivy:
              enabled: true
            eslint:
              enabled: false
            stylelint:
              enabled: false
          EOF

      # 2. Run Codacy Analysis (without the tool: flag so it reads .codacy.yaml)
      - name: Run Codacy Analysis CLI
        uses: codacy/codacy-analysis-cli-action@master
        continue-on-error: true
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          verbose: true
          output: results.sarif
          format: sarif
          gh-code-scanning-compat: true
          max-allowed-issues: 2147483647
          skip-uncommitted-files-check: true
          exclude-paths: >
            node_modules,
            frontend/node_modules,
            backend/node_modules,
            frontend/.next,
            backend/venv,
            backend/.venv,
            backend/chroma_db,
            backend/data,
            backend/logs,
            backend/data/orchestration_runs,
            backend/.playwright-mcp,
            dist,
            frontend-build,
            synapse/_frontend,
            **/__pycache__,
            **/*.egg-info,
            **/*.whl,
            **/*.tar.gz,
            package-lock.json,
            frontend/package-lock.json,
            backend/package-lock.json,
            tsconfig.tsbuildinfo,
            frontend/tsconfig.tsbuildinfo

      # 3. Automatically split the SARIF file to bypass GitHub limits while retaining tool names
      - name: Split SARIF into individual files
        run: |
          sudo python3 -c '
          import json, sys, os

          # Create a directory to hold the split files
          output_dir = "sarif_split"
          os.makedirs(output_dir, exist_ok=True)

          # Fallback if Codacy CLI failed to generate a valid file
          if not os.path.exists("results.sarif") or os.path.getsize("results.sarif") == 0:
              print("Warning: SARIF file missing or empty. Creating a valid placeholder.")
              data = {"$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json", "version": "2.1.0", "runs": []}
          else:
              try:
                  with open("results.sarif", "r") as f:
                      data = json.load(f)
              except json.JSONDecodeError:
                  print("Warning: SARIF file was corrupt. Creating a valid placeholder.")
                  data = {"$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json", "version": "2.1.0", "runs": []}

          runs = data.get("runs", [])
          if not runs:
              # Create a single empty file if there are no runs
              with open(os.path.join(output_dir, "empty.sarif"), "w") as f:
                  json.dump(data, f)
              print("No runs found. Created empty placeholder.")
              sys.exit(0)

          # Split each run into its own file with a unique category ID
          for i, run in enumerate(runs):
              tool_name = run.get("tool", {}).get("driver", {}).get("name", "tool")
              clean_name = tool_name.lower().replace(" ", "-")
              
              if "automationDetails" not in run:
                  run["automationDetails"] = {}
              
              # Provide a strictly unique category for GitHub Advanced Security
              run["automationDetails"]["id"] = "codacy-" + clean_name + "-" + str(i)
              
              # Build the single-run SARIF structure
              new_sarif = {
                  "$schema": data.get("$schema", "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json"),
                  "version": data.get("version", "2.1.0"),
                  "runs": [run]
              }
              
              # Save it in the split directory
              file_path = os.path.join(output_dir, "run_" + str(i) + ".sarif")
              with open(file_path, "w") as out_f:
                  json.dump(new_sarif, out_f, indent=2)

          print("Successfully split " + str(len(runs)) + " runs into individual SARIF files.")
          '

      # 4. Upload each file SEPARATELY via GitHub API
      - name: Upload SARIF files separately
        env:
          # This is automatically provided by GitHub. You do NOT need to add it to your secrets.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Starting individual uploads to bypass GitHub Action merging..."          
          for file in sarif_split/*.sarif; do
            echo "Uploading $file..."
            
            # Compress and encode the file as required by the GitHub API
            gzip -c "$file" > payload.gz
            b64_payload=$(base64 -w0 payload.gz)
            
            # Upload directly via the GitHub CLI API (Removed the invalid flag)
            gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              /repos/${{ github.repository }}/code-scanning/sarifs \
              -f commit_sha="${{ github.sha }}" \
              -f ref="${{ github.ref }}" \
              -f sarif="$b64_payload"
              
            # A tiny 2-second pause to respect API rate limits
            sleep 2
          done
          
          echo "All SARIF files successfully uploaded independently!"